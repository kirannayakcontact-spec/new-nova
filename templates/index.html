<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><meta name="theme-color" content="#2AABEE">
<link rel="manifest" href="{{ manifest_url }}"><link rel="apple-touch-icon" href="/icon.svg"><title>TITAN NOVA Admin</title>
<script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"><link rel="stylesheet" href="/static/styles.css">
</head><body class="bg-[#17212B] text-white min-h-screen pb-24">
<script>window.BOOT_STATE={{ state|tojson }};window.MARKETS={{ markets|tojson }};window.BASE_MARKETS={{ baseMarkets|tojson }};window.CHART_LINKS={{ chartLinks|tojson }};window.IS_MASTER={{ 'true' if is_master else 'false' }};</script>
<div id="toast" class="fixed top-3 left-1/2 -translate-x-1/2 z-[9999] w-[94%] max-w-md space-y-2 pointer-events-none"></div>
<header class="sticky top-0 z-50 bg-[#1C2733]/95 backdrop-blur border-b border-white/10 px-3 py-2 flex items-center gap-2">
<button id="menuBtn" class="touch w-11 h-11 rounded-xl bg-[#232E3C]"><i class="fa-solid fa-bars"></i></button><div class="flex-1"><h1 class="font-black text-sm tracking-wide">TITAN NOVA CONTROL</h1><p id="healthLine" class="text-[10px] text-[#7A9CB8]">Native web admin • live bot controls</p></div><input id="appDate" type="date" class="bg-[#232E3C] border border-white/10 rounded-xl px-2 py-2 text-xs max-w-[138px]"><button onclick="refreshAll()" class="touch w-11 h-11 rounded-xl bg-[#2AABEE]"><i class="fa-solid fa-rotate"></i></button>
</header>
<aside id="side" class="fixed inset-y-0 left-0 z-[80] w-80 max-w-[86vw] -translate-x-full transition bg-[#1C2733] border-r border-white/10 p-4 overflow-y-auto"><div class="flex items-center gap-3 mb-4"><div class="w-12 h-12 rounded-2xl bg-[#2AABEE] grid place-items-center font-black">TN</div><div><b>TITAN NOVA</b><p class="text-xs text-[#7A9CB8]">WhatsApp Bot OS</p></div></div><div id="sideNav" class="grid gap-2"></div><button onclick="installPWA()" class="mt-4 w-full touch rounded-xl bg-[#00C26F] font-bold"><i class="fa-solid fa-download mr-2"></i>Install App</button></aside><div id="shade" class="fixed inset-0 z-[70] bg-black/60 hidden" onclick="toggleSide(false)"></div>
<main id="app" class="p-3 max-w-6xl mx-auto"></main>
<nav id="bottom" class="fixed bottom-0 inset-x-0 z-50 bg-[#1C2733] border-t border-white/10 flex gap-1 overflow-x-auto px-2 py-2 pb-[calc(8px+env(safe-area-inset-bottom))]"></nav>
<div id="targetModal" class="modal"><div class="sheet"><div class="handle"></div><h3 class="font-black mb-2">Target Picker</h3><p class="text-xs text-[#7A9CB8] mb-3">WhatsApp groups/contacts select karein</p><div class="flex gap-2 mb-3"><button onclick="loadTargets()" class="btn blue flex-1">Refresh</button><button onclick="closeModal('targetModal')" class="btn dark">Close</button></div><div id="targetList" class="grid gap-2 max-h-[55vh] overflow-y-auto"></div><button onclick="applyPickedTargets()" class="btn green w-full mt-3">Apply Targets</button></div></div>
<div id="shareModal" class="modal"><div class="sheet"><div class="handle"></div><h3 class="font-black mb-2">Share / Preview</h3><textarea id="shareText" class="input h-48 text-left" readonly></textarea><button onclick="navigator.clipboard.writeText(document.getElementById('shareText').value);toast('Copied','Report copied','success')" class="btn blue w-full mt-3">Copy Text</button><button onclick="closeModal('shareModal')" class="btn dark w-full mt-2">Close</button></div></div>
<div id="installBanner" class="fixed left-3 right-3 bottom-24 z-40 hidden rounded-2xl border border-[#2AABEE] bg-[#1A3348] p-3 shadow-xl"><div class="flex items-center gap-3"><i class="fa-solid fa-mobile-screen text-2xl text-[#2AABEE]"></i><div class="flex-1"><b class="text-sm">Native app mode</b><p class="text-xs text-[#7A9CB8]">Home screen par install karein.</p></div><button onclick="installPWA()" class="btn blue">Install</button><button onclick="this.closest('#installBanner').classList.add('hidden')" class="text-[#7A9CB8] px-2"><i class="fa-solid fa-xmark"></i></button></div></div>
<script src="/static/app.js"></script></body></html>

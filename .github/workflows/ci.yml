name: Titan Nova CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m py_compile flask_app.py backend/run.py backend/wsgi.py backend/role_router_proxy.py scripts/health_check.py tests/test_structure.py
      - run: python -m unittest discover -s tests -v

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n scripts/nova.sh
      - run: bash -n scripts/install_nova_command.sh
      - run: bash -n scripts/install_termux.sh
      - run: bash -n scripts/update_termux.sh
      - run: bash -n scripts/start_web.sh
      - run: bash -n scripts/start_bot.sh

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --package-lock=false --ignore-scripts
      - run: node --check Gateway.js
      - run: node --check gateway/roleRouter.js
      - run: node --check gateway/roleRouterUi.js
      - run: node --check bot/index.js
      - run: node --check ecosystem.config.js
